<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      color: #1f1f1f;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 20px;
    }

    .box {
      background: #fafafa;
      border: 1px solid #d0d0d0;
      padding: 12px;
      white-space: pre-line;
      max-height: 420px;
      overflow-y: auto;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .secondary {
      background: #f3f3f3;
      border: 1px solid #cccccc;
    }
  </style>
</head>
<body>
  <h2><?= titulo ?></h2>

  <div class="box"><?= mensaje ?></div>

  <div class="actions">
    <button class="secondary" onclick="volverAlPanel()">Volver al panel</button>
    <button class="secondary" onclick="google.script.host.close()">Cerrar</button>
  </div>
  <script>
    function volverAlPanel() {
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert(error.message || String(error));
        })
        .abrirHomeDashboardDesdePantalla();
    }
  </script>
</body>
</html>
