<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .loading-spinner { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="dashboardData()" x-init="load()">
  
  <div class="max-w-7xl mx-auto p-6" x-cloak>
    
    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-indigo-700">Panel de Gestión Clínica</h1>
        <p class="text-gray-500 text-sm">Actualizado el <span x-text="data.fechaActualizacion"></span></p>
      </div>
      <div class="flex space-x-3">
        <button @click="callAction('homeActualizarEstadosAutomaticos')" class="px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 transition">
          🔄 Recalcular Estados
        </button>
        <button @click="load()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg shadow-md hover:bg-indigo-700 transition">
          Refrescar Panel
        </button>
      </div>
    </header>

    <!-- Alertas -->
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
      <template x-for="alerta in data.alertas" :key="alerta.titulo">
        <div class="p-4 rounded-xl border flex flex-col" 
             :class="{'bg-yellow-50 border-yellow-200 text-yellow-700': alerta.tipo === 'warning', 'bg-red-50 border-red-200 text-red-700': alerta.tipo === 'danger', 'bg-blue-50 border-blue-200 text-blue-700': alerta.tipo === 'info'}">
          <span class="text-xs font-bold uppercase" x-text="alerta.titulo"></span>
          <span class="text-2xl font-black mt-1" x-text="alerta.detalle"></span>
        </div>
      </template>
    </div>

    <!-- Estadísticas Rápidas -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-sm text-gray-400 font-medium">Pacientes Activos</p>
        <h3 class="text-3xl font-bold mt-1" x-text="data.resumen.activos"></h3>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-sm text-gray-400 font-medium">En Espera</p>
        <h3 class="text-3xl font-bold mt-1" x-text="data.resumen.espera"></h3>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-sm text-gray-400 font-medium">Ciclos en Curso</p>
        <h3 class="text-3xl font-bold mt-1 text-indigo-600" x-text="data.resumen.gruposEnCurso"></h3>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-sm text-gray-400 font-medium text-red-500">Incidencias Calendar</p>
        <h3 class="text-3xl font-bold mt-1 text-red-600" x-text="data.resumenIncidenciasCalendario.cantidad"></h3>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      
      <!-- Próximos Pacientes -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
          <h4 class="font-bold text-gray-700">Agenda Próxima</h4>
          <button @click="callAction('homeAbrirPantallaPacientes')" class="text-indigo-600 text-sm font-semibold hover:underline">Ver todos</button>
        </div>
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="text-gray-400">
              <th class="px-5 py-3 font-medium">Paciente</th>
              <th class="px-5 py-3 font-medium">Siguiente Cita</th>
              <th class="px-5 py-3 font-medium">Estado</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in data.proximosPacientes" :key="p.PacienteID">
              <tr class="border-t border-gray-50 hover:bg-gray-50">
                <td class="px-5 py-3 font-semibold" x-text="p.Nombre"></td>
                <td class="px-5 py-3" x-text="p.ProximaSesion"></td>
                <td class="px-5 py-3">
                  <span class="px-2 py-1 rounded-full text-xs font-bold"
                        :class="p.EstadoPaciente === 'ACTIVO' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'"
                        x-text="p.EstadoPaciente"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Acciones Rápidas -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h4 class="font-bold text-gray-700 mb-6">Operativa</h4>
        <div class="grid grid-cols-2 gap-4">
          <button @click="callAction('homeNuevoPaciente')" class="flex flex-col items-center justify-center p-6 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition border-2 border-transparent hover:border-indigo-200">
            <span class="text-2xl mb-2">👤+</span>
            <span class="text-indigo-700 font-bold text-sm">Nuevo Paciente</span>
          </button>
          <button @click="callAction('homeAbrirReprogramarSesion')" class="flex flex-col items-center justify-center p-6 bg-orange-50 rounded-xl hover:bg-orange-100 transition border-2 border-transparent hover:border-orange-200">
            <span class="text-2xl mb-2">📅</span>
            <span class="text-orange-700 font-bold text-sm">Reprogramar</span>
          </button>
          <button @click="callAction('homeAltaPaciente')" class="flex flex-col items-center justify-center p-6 bg-emerald-50 rounded-xl hover:bg-emerald-100 transition border-2 border-transparent hover:border-emerald-200">
            <span class="text-2xl mb-2">✅</span>
            <span class="text-emerald-700 font-bold text-sm">Alta Médica</span>
          </button>
          <button @click="callAction('homeSincronizarGoogleCalendar')" class="flex flex-col items-center justify-center p-6 bg-blue-50 rounded-xl hover:bg-blue-100 transition border-2 border-transparent hover:border-blue-200">
            <span class="text-2xl mb-2">☁️</span>
            <span class="text-blue-700 font-bold text-sm">Sync Calendar</span>
          </button>
        </div>
      </div>

    </div>

  </div>

  <!-- Pantalla de carga -->
  <div x-show="loading" class="fixed inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center z-50">
    <div class="loading-spinner h-16 w-16 border-4 border-gray-200 rounded-full mb-4"></div>
    <p class="text-indigo-600 font-bold">Cargando datos...</p>
  </div>

  <script>
    function dashboardData() {
      return {
        loading: true,
        data: {
          resumen: {},
          alertas: [],
          proximosPacientes: [],
          fechaActualizacion: ''
        },
        load() {
          this.loading = true;
          google.script.run
            .withSuccessHandler(res => {
              this.data = res;
              this.loading = false;
            })
            .withFailureHandler(err => {
              alert("Error al cargar: " + err.message);
              this.loading = false;
            })
            .obtenerDatosHomeDashboard();
        },
        callAction(fn) {
          this.loading = true;
          google.script.run
            .withSuccessHandler(() => {
              this.load();
            })
            .withFailureHandler(err => {
              alert("Error: " + err.message);
              this.loading = false;
            })[fn]();
        }
      }
    }
  </script>
</body>
</html>
