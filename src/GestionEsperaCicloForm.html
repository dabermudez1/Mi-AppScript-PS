<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --primary: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
    h2 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
    select, textarea, input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
    textarea { resize: none; height: 90px; background: #fdfdfd; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
    .primary { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .primary:hover { background-color: var(--primary-hover); }
    .primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
    .secondary:hover { background-color: #f3f4f6; }
    .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; }
    .error { color: #dc2626; font-weight: bold; }
    .success { color: #16a34a; font-weight: bold; }
  </style>
</head>

<body>

<h2>Gestión de espera / reasignación</h2>

<div class="field">
  <label for="paciente">Paciente</label>
  <select id="paciente" onchange="onPacienteChange()"></select>
</div>

<div class="field">
  <label for="detallePaciente">Detalle paciente</label>
  <textarea id="detallePaciente" readonly></textarea>
</div>

<div class="field">
  <label>Operación a realizar</label>
  <div id="displayAccion" style="padding: 10px; background: #f3f4f6; border-radius: 8px; font-weight: bold; font-size: 13px; border: 1px solid #d1d5db; color: #4b5563;">-- Selecciona un paciente --</div>
</div>

<div class="field">
  <label for="ciclo">Grupo destino</label>
  <select id="ciclo" onchange="actualizarDetalleCiclo()"></select>
</div>

<div class="field">
  <label for="detalleCiclo">Detalle grupo destino</label>
  <textarea id="detalleCiclo" readonly></textarea>
</div>

<div class="actions">
  <button id="btnGuardar" class="primary" onclick="guardar()" disabled>Guardar cambios</button>
  <button id="btnVolver" class="secondary" onclick="volverPanel()">Volver al panel</button>
  <button id="btnCerrar" class="secondary" onclick="cerrar()">Cerrar</button>
</div>

<div id="status" class="status"></div>

<script>
  let pacientes = [];
  let ciclos = [];
  let estadoActual = {
    paciente: null,
    tipoAccion: null
  };

  function setStatus(message, type) {
    const el = document.getElementById('status');
    el.textContent = message || '';
    el.className = 'status ' + (type || '');
  }

  function setGuardarEnabled(enabled) {
    document.getElementById('btnGuardar').disabled = !enabled;
  }

  function cerrar() {
    google.script.host.close();
  }

  function volverPanel() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.host.close();
    })
    .abrirHomeDashboardDesdePantalla();
  }

  function limpiarDetallePaciente() {
  document.getElementById('detallePaciente').value = '';
  const display = document.getElementById('displayAccion');
  display.textContent = '-- Selecciona un paciente --';
  display.style.background = '#f0f0f0';
  estadoActual.paciente = null;
  estadoActual.tipoAccion = null;
  }

  function limpiarCiclos() {
  ciclos = [];

  const select = document.getElementById('ciclo');
  select.innerHTML = '';

  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '-- Selecciona un ciclo destino --';
  select.appendChild(placeholder);

  select.value = '';
  document.getElementById('detalleCiclo').value = '';
  }

  function init() {
  const select = document.getElementById('paciente');
  select.innerHTML = '';

  const cargando = document.createElement('option');
  cargando.value = '';
  cargando.textContent = 'Cargando pacientes...';
  select.appendChild(cargando);

  google.script.run
    .withSuccessHandler(function(resultado) {
      pacientes = resultado || [];
      select.innerHTML = '';

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = pacientes.length > 0
        ? '-- Selecciona un paciente --'
        : 'No hay pacientes disponibles';
      select.appendChild(placeholder);

      pacientes.forEach(function(p) {
        const option = document.createElement('option');
        option.value = p.pacienteId;
        option.textContent = p.label || p.pacienteId || 'Paciente';
        select.appendChild(option);
      });

      limpiarDetallePaciente();
      limpiarCiclos();
      setGuardarEnabled(false);
      setStatus('', '');
    })
    .withFailureHandler(function(error) {
      select.innerHTML = '';

      const option = document.createElement('option');
      option.value = '';
      option.textContent = 'Error al cargar pacientes';
      select.appendChild(option);

      setStatus(error && error.message ? error.message : String(error), 'error');
    })
    .obtenerPacientesGestionEsperaCicloFormulario();
  }

  function onPacienteChange() {
    const pacienteId = document.getElementById('paciente').value;

    limpiarDetallePaciente();
    limpiarCiclos();
    setGuardarEnabled(false);
    setStatus('', '');

    if (!pacienteId) return;

    google.script.run
      .withSuccessHandler(function(detalle) {
        estadoActual.paciente = detalle;
        estadoActual.tipoAccion = detalle.tipoAccion;

        document.getElementById('detallePaciente').value =
          'Nombre: ' + (detalle.nombre || '') + '\n' +
          'Modalidad: ' + (detalle.modalidad || '') + '\n' +
          'Estado: ' + (detalle.estadoPaciente || '') + '\n' +
          'Primera consulta: ' + (detalle.fechaPrimeraConsulta || '') + '\n' +
          'Motivo espera: ' + (detalle.motivoEspera || '') + '\n' +
          'Ciclo objetivo: ' + (detalle.cicloObjetivoId || '') + '\n' +
          'Ciclo activo: ' + (detalle.cicloActivoId || '') + '\n' +
          'Próxima sesión: ' + (detalle.proximaSesion || '') + '\n' +
          'Observaciones: ' + (detalle.observaciones || '');

        const displayAccion = document.getElementById('displayAccion');
        displayAccion.textContent = detalle.labelAccion;
        displayAccion.style.background = (detalle.tipoAccion === 'REASIGNAR') ? '#fff3e0' : '#e8f5e9';
        displayAccion.style.color = (detalle.tipoAccion === 'REASIGNAR') ? '#e65100' : '#1b5e20';
        displayAccion.style.borderColor = (detalle.tipoAccion === 'REASIGNAR') ? '#ffe0b2' : '#c8e6c9';

        cargarCiclosPaciente(pacienteId);
      })
      .withFailureHandler(function(error) {
        setStatus(error.message || String(error), 'error');
      })
      .obtenerDetallePacienteGestionEsperaCicloFormulario(pacienteId);
  }

  function cargarCiclosPaciente(pacienteId) {
  google.script.run
    .withSuccessHandler(function(resultado) {
      ciclos = resultado || [];
      const select = document.getElementById('ciclo');
      select.innerHTML = '';

      const accion = estadoActual.tipoAccion;

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = ciclos.length > 0
        ? (
            accion === 'REASIGNAR'
              ? '-- Selecciona un nuevo grupo --'
              : '-- Selecciona un grupo destino --'
          )
        : (
            accion === 'REASIGNAR'
              ? 'No hay otros grupos compatibles'
              : 'No hay grupos compatibles'
          );
      select.appendChild(placeholder);

      ciclos.forEach(function(c) {
        const option = document.createElement('option');
        option.value = c.cicloId;
        option.textContent =
          (c.modalidad || '') +
          ' | Ciclo ' + (c.numeroCiclo || '') +
          ' | Inicio ' + (c.fechaInicio || '');
        select.appendChild(option);
      });

      actualizarDetalleCiclo();
      setGuardarEnabled(ciclos.length > 0);
    })
    .withFailureHandler(function(error) {
      setStatus(error.message || String(error), 'error');
    })
    .obtenerCiclosGestionEsperaCicloFormulario(
      pacienteId,
      estadoActual.tipoAccion
    );
  }

  function actualizarDetalleCiclo() {
    const cicloId = document.getElementById('ciclo').value;
    const detalle = document.getElementById('detalleCiclo');

    const ciclo = ciclos.find(c => String(c.cicloId) === String(cicloId));

    if (!ciclo) {
      detalle.value = '';
      return;
    }

    detalle.value =
      'Modalidad: ' + (ciclo.modalidad || '') + '\n' +
      'Número ciclo: ' + (ciclo.numeroCiclo || '') + '\n' +
      'Estado: ' + (ciclo.estadoCiclo || '') + '\n' +
      'Fecha inicio: ' + (ciclo.fechaInicio || '') + '\n' +
      'Plazas libres: ' + (ciclo.plazasLibres || 0);
  }

  function guardar() {
    const pacienteId = document.getElementById('paciente').value;
    const cicloId = document.getElementById('ciclo').value;

    if (!pacienteId || !cicloId) {
      setStatus('Selecciona paciente y ciclo destino.', 'error');
      return;
    }

    const btn = document.getElementById('btnGuardar');
    const btnVolver = document.getElementById('btnVolver');
    const btnCerrar = document.getElementById('btnCerrar');
    
    btn.disabled = true;
    btn.innerText = 'Procesando...';
    btnVolver.disabled = true;
    btnCerrar.disabled = true;
    setStatus('', '');
    setStatus('⏳ Guardando cambios en el sistema...', '');

    google.script.run
      .withSuccessHandler(function(res) {
        btn.innerText = 'Guardar cambios';
        setStatus((res && res.mensaje) || 'Guardado correctamente.', 'success');
      })
      .withFailureHandler(function(err) {
        btn.innerText = 'Guardar cambios';
        setStatus(err.message || String(err), 'error');
        setGuardarEnabled(true);
        btnVolver.disabled = false;
        btnCerrar.disabled = false;
      })
      .confirmarGestionEsperaCicloFormulario({
        pacienteId: pacienteId,
        cicloId: cicloId,
        tipoAccion: estadoActual.tipoAccion
      });
  }


  init();
</script>

</body>
</html>
