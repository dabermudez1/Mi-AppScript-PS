<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root { --primary: #4f46e5; --danger: #dc2626; --danger-hover: #b91c1c; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
      h2 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
      .field { margin-bottom: 16px; }
      label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
      select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
      textarea { resize: none; height: 130px; background: #fdfdfd; }
      .warning { background-color: #fffbeb; border-left: 4px solid #f59e0b; padding: 12px; margin-bottom: 20px; font-size: 0.85em; border-radius: 0 8px 8px 0; color: #92400e; line-height: 1.5; }
      .actions { display: flex; gap: 10px; margin-top: 24px; }
      button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
      .danger { background-color: var(--danger); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .danger:hover { background-color: var(--danger-hover); }
      .danger:disabled { opacity: 0.5; cursor: not-allowed; }
      .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
      .secondary:hover { background-color: #f3f4f6; }
      .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; color: #6b7280; }
      .error { color: #dc2626; font-weight: bold; }
      .success { color: #16a34a; font-weight: bold; }
    </style>
  </head>
  <body>
    <h2>Eliminar grupo por error</h2>
    <div class="warning">
      <strong>Atención:</strong> Esta acción elimina el ciclo, sus sesiones y asignaciones.<br>
      Los pacientes vinculados volverán automáticamente al estado <strong>ESPERA</strong>.
    </div>
    <div class="field">
      <label for="ciclo">Ciclo a eliminar</label>
      <select id="ciclo" onchange="cargarImpacto()"></select>
    </div>
    <div class="field">
      <label for="impacto">Impacto del borrado</label>
      <textarea id="impacto" readonly></textarea>
    </div>
    <div class="actions">
      <button id="btnEliminar" class="danger" onclick="eliminarCiclo()" disabled>Eliminar Ciclo</button>
      <button id="btnVolver" class="secondary" onclick="volverAlPanel()">Volver al panel</button>
      <button id="btnCerrar" class="secondary" onclick="google.script.host.close()">Cerrar</button>
    </div>
    <div id="status" class="status"></div>

    <script>
      function setStatus(message, type) {
        const el = document.getElementById('status');
        el.textContent = message || '';
        el.className = 'status ' + (type || '');
      }

      function cargarCiclos() {
        setStatus('Cargando ciclos...', '');
        google.script.run
          .withSuccessHandler(function(resultado) {
            const select = document.getElementById('ciclo');
            select.innerHTML = '<option value="">-- Selecciona un ciclo --</option>';
            if (!resultado || resultado.length === 0) {
              setStatus('No se encontraron ciclos.', 'error');
              return;
            }
            resultado.forEach(c => {
              const opt = document.createElement('option');
              opt.value = c.cicloId;
              opt.textContent = c.label;
              select.appendChild(opt);
            });
            setStatus('', '');
          })
          .withFailureHandler(function(err) {
            setStatus('Error al cargar ciclos: ' + err.message, 'error');
          })
          .obtenerCiclosEliminablesFormulario();
      }

      function cargarImpacto() {
        const id = document.getElementById('ciclo').value;
        const txt = document.getElementById('impacto');
        const btn = document.getElementById('btnEliminar');
        txt.value = '';
        btn.disabled = true;
        if (!id) return;

        txt.value = 'Calculando impacto...';
        google.script.run
          .withSuccessHandler(function(i) {
            txt.value = 
              'CICLO: ' + i.modalidad + ' (Nº ' + i.numeroCiclo + ')\n' +
              'ESTADO: ' + i.estado + '\n\n' +
              'DATOS A BORRAR:\n' +
              '- ' + i.sesionesContar + ' sesiones programadas.\n' +
              '- ' + i.asignacionesContar + ' registros de historial.\n\n' +
              'PACIENTES AFECTADOS (' + i.pacientesContar + '):\n' +
              (i.nombresPacientes || 'Ninguno') + '\n\n' +
              'NOTA: Estos pacientes volverán a la lista de ESPERA.';
            btn.disabled = false;
          })
          .withFailureHandler(function(err) {
            setStatus('Error al calcular impacto: ' + err.message, 'error');
          })
          .obtenerImpactoEliminacionCicloFormulario(id);
      }

      function eliminarCiclo() {
        const id = document.getElementById('ciclo').value;
        if (!confirm('¿Estás SEGURO de eliminar este ciclo?\n\nEsta operación no se puede deshacer y afectará a los pacientes asignados.')) return;
        
        const btn = document.getElementById('btnEliminar');
        const btnVolver = document.getElementById('btnVolver');
        const btnCerrar = document.getElementById('btnCerrar');

        btn.disabled = true;
        btnVolver.disabled = true;
        btnCerrar.disabled = true;
        btn.innerText = 'Procesando...';
        setStatus('⏳ Eliminando ciclo y limpiando datos...', '');

        google.script.run
          .withSuccessHandler(function(res) {
            btn.innerText = 'Eliminar Ciclo';
            setStatus(res.mensaje, 'success');
            cargarCiclos();
            document.getElementById('impacto').value = '';
          })
          .withFailureHandler(function(err) {
            btn.innerText = 'Eliminar Ciclo';
            btn.disabled = false;
            btnVolver.disabled = false;
            btnCerrar.disabled = false;
            setStatus(err.message, 'error');
          })
          .confirmarEliminacionCicloFormulario({ cicloId: id });
      }

      function volverAlPanel() {
        google.script.run
          .withSuccessHandler(function() {
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert("Error al abrir panel: " + error.message);
          })
          .abrirHomeDashboard();
      }

      cargarCiclos();
    </script>
  </body>
</html>
