<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --primary: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
    h3 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
    select, input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
    textarea { height: 70px; resize: vertical; }
    .checkbox-field { display: flex; align-items: center; gap: 10px; background: #fff7ed; padding: 12px; border-radius: 8px; border: 1px solid #ffedd5; margin-top: 5px; }
    .checkbox-field input { width: auto; cursor: pointer; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
    .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background-color: #f3f4f6; }
    #status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; color: #6b7280; }
    .error { color: #dc2626; font-weight: bold; }
    small { color: #6b7280; font-style: italic; font-size: 0.75rem; }
  </style>
</head>
<body>

<h3>Editar Grupo / Cerrar Cupo</h3>

<div class="field">
  <label for="cicloSelect">Seleccionar Grupo Activo</label>
  <select id="cicloSelect" onchange="cargarDetalle()">
    <option value="">-- Cargando grupos... --</option>
  </select>
</div>

<div id="formEdicion" style="display:none;">
  <div class="field">
    <label for="capacidadMaxima">Capacidad Máxima</label>
    <input type="number" id="capacidadMaxima" min="1">
    <small id="ocupadasInfo"></small>
  </div>

  <div class="field checkbox-field">
    <input type="checkbox" id="bloqueoInscripciones">
    <label for="bloqueoInscripciones" style="margin-bottom:0; cursor:pointer;">Bloquear nuevas inscripciones</label>
  </div>

  <div class="field">
    <label for="notas">Notas / Observaciones del Grupo</label>
    <textarea id="notas" placeholder="Ej: Grupo cerrado por decisión clínica..."></textarea>
  </div>

  <div class="actions">
    <button type="button" class="btn-secondary" id="btnVolver" onclick="volverAlPanel()">Volver al panel</button>
    <button type="button" class="btn-secondary" id="btnCerrar" onclick="google.script.host.close()">Cerrar</button>
    <button type="button" class="btn-primary" id="btnGuardar" onclick="guardar()">Guardar Cambios</button>
  </div>
</div>

<div id="status"></div>

<script>
  const cicloPreseleccionadoId = '<?= typeof cicloPreseleccionadoId !== "undefined" ? cicloPreseleccionadoId : "" ?>';
  const origenPantalla = '<?= typeof origenPantalla !== "undefined" ? origenPantalla : "" ?>';

  function setStatus(msg, isError) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function init() {
    google.script.run
      .withSuccessHandler(function(ciclos) {
        const select = document.getElementById('cicloSelect');
        select.innerHTML = ciclos.length > 0 ? '<option value="">-- Selecciona un grupo --</option>' : '<option value="">No hay grupos editables</option>';
        ciclos.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.cicloId;
          opt.textContent = c.label;
          select.appendChild(opt);
        });

        if (cicloPreseleccionadoId) {
          select.value = cicloPreseleccionadoId;
          select.disabled = true;
          cargarDetalle();
        }
      })
      .obtenerCiclosEdicionFormulario();
  }

  function volverAlPanel() {
    if (origenPantalla === 'CICLOS') {
      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .abrirPantallaCiclos();
      return;
    }
    
    google.script.run
      .withSuccessHandler(() => google.script.host.close())
      .abrirHomeDashboardDesdePantalla();
  }

  function cargarDetalle() {
    const cicloId = document.getElementById('cicloSelect').value;
    const form = document.getElementById('formEdicion');
    
    // Ocultar formulario y limpiar estado previo inmediatamente
    form.style.display = 'none';
    setStatus('', '');
    if (!cicloId) return;
    
    setStatus('Cargando detalles del grupo...', '');
    
    google.script.run
      .withSuccessHandler(function(d) {
        setStatus('', ''); // Limpiar mensaje de carga
        document.getElementById('capacidadMaxima').value = d.capacidadMaxima;
        document.getElementById('bloqueoInscripciones').checked = d.bloqueoInscripciones;
        document.getElementById('notas').value = d.notas;
        document.getElementById('ocupadasInfo').textContent = 'Plazas actualmente ocupadas: ' + d.plazasOcupadas;
        form.style.display = 'block';
      })
      .withFailureHandler(err => setStatus(err.message, true))
      .obtenerDetalleCicloEdicion(cicloId);
  }

  function guardar() {
    const data = {
      cicloId: document.getElementById('cicloSelect').value,
      capacidadMaxima: document.getElementById('capacidadMaxima').value,
      bloqueoInscripciones: document.getElementById('bloqueoInscripciones').checked,
      notas: document.getElementById('notas').value
    };

    const btn = document.getElementById('btnGuardar');
    const btnVolver = document.getElementById('btnVolver');
    const btnCerrar = document.getElementById('btnCerrar');

    btn.disabled = true;
    btnVolver.disabled = true;
    btnCerrar.disabled = true;
    btn.innerText = 'Procesando...';
    setStatus('⏳ Guardando cambios del grupo...', '');

    google.script.run
      .withSuccessHandler(res => { 
        btn.innerText = 'Guardar Cambios';
        alert(res.mensaje); 
        // No cerramos el host, simplemente refrescamos el detalle para ver el estado guardado
        cargarDetalle();
      })
      .withFailureHandler(err => {
        btn.innerText = 'Guardar Cambios';
        btn.disabled = false;
        btnVolver.disabled = false;
        btnCerrar.disabled = false;
        setStatus(err.message, true);
      })
      .guardarEdicionCiclo(data);
  }
  init();
</script>
</body>
</html>
