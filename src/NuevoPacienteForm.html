<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root { --primary: #4f46e5; --primary-hover: #4338ca; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
      h2 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
      .field { margin-bottom: 16px; }
      label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
      select, input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
      input:focus, select:focus { outline: 2px solid #818cf8; border-color: transparent; }
      .actions { display: flex; gap: 10px; margin-top: 24px; }
      button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
      .primary { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .primary:hover { background-color: var(--primary-hover); }
      .primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
      .secondary:hover { background-color: #f3f4f6; }
      .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; color: #6b7280; }
      .error { color: #dc2626; font-weight: bold; }
      .success { color: #16a34a; font-weight: bold; }
    </style>
  </head>
  <body>
    <h2>Nuevo paciente</h2>

    <div class="field">
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" maxlength="120" />
    </div>

    <div class="field">
      <label for="nhc">NHC</label>
      <input id="nhc" type="text" maxlength="50" />
    </div>

    <div class="field">
      <label for="sexoGenero">Género</label>
      <select id="sexoGenero">
        <option value="">-- Selecciona --</option>
        <option value="Varón">Varón</option>
        <option value="Mujer">Mujer</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="field">
      <label for="motivoConsultaDiagnostico">Motivo consulta / diagnóstico</label>
      <select id="motivoConsultaDiagnostico" onchange="actualizarMotivoOtros()">
        <option value="">-- Selecciona --</option>
        <option value="Trastorno adaptativo">Trastorno adaptativo</option>
        <option value="Duelo">Duelo</option>
        <option value="Episodio depresivo">Episodio depresivo</option>
        <option value="Trastorno de ansiedad">Trastorno de ansiedad</option>
        <option value="Trastorno de síntomas somáticos">Trastorno de síntomas somáticos</option>
        <option value="Otros">Otros</option>
      </select>
    </div>

    <div class="field">
      <label for="motivoConsultaOtros">Motivo consulta / diagnóstico - otros</label>
      <input id="motivoConsultaOtros" type="text" maxlength="150" />
    </div>

    <div class="field">
      <label for="modalidad">Modalidad</label>
      <select id="modalidad"></select>
    </div>

    <div class="field">
      <label for="fechaPrimeraConsulta">Fecha primera consulta</label>
      <input id="fechaPrimeraConsulta" type="date" />
    </div>

    <div class="actions">
  <button id="btnGuardar" class="primary" onclick="guardar()">Guardar Paciente</button>
  <button id="btnVolver" class="secondary" onclick="volverAlPanel()">Volver al panel</button>
  <button id="btnCerrar" class="secondary" onclick="google.script.host.close()">Cerrar</button>
</div>

    <div id="status" class="status"></div>

    <script>
    function setStatus(message, type) {
    const el = document.getElementById('status');
    el.textContent = message || '';
    el.className = 'status ' + (type || '');
  }

  function cargarModalidades() {
    google.script.run
      .withSuccessHandler(function(opciones) {
        const select = document.getElementById('modalidad');
        select.innerHTML = '';

        opciones.forEach(function(op) {
          const option = document.createElement('option');
          option.value = op.value;
          option.textContent = op.label;
          select.appendChild(option);
        });
      })
      .withFailureHandler(function(error) {
        setStatus(error.message || String(error), 'error');
      })
      .obtenerOpcionesModalidadFormulario();
  }

  function guardar() {
    const nombre = document.getElementById('nombre').value.trim();
    const nhc = document.getElementById('nhc').value.trim();
    const sexoGenero = document.getElementById('sexoGenero').value;
    const motivoConsultaDiagnostico = document.getElementById('motivoConsultaDiagnostico').value;
    const motivoConsultaOtros = document.getElementById('motivoConsultaOtros').value.trim();
    const modalidad = document.getElementById('modalidad').value;
    const fechaPrimeraConsulta = document.getElementById('fechaPrimeraConsulta').value;

    if (!nhc) {
      setStatus('El NHC es obligatorio.', 'error');
      return;
    }

    if (motivoConsultaDiagnostico === 'Otros' && !motivoConsultaOtros) {
      setStatus('Debes indicar el motivo cuando eliges "Otros".', 'error');
      return;
    }

    const btn = document.getElementById('btnGuardar');
    const btnVolver = document.getElementById('btnVolver');
    const btnCerrar = document.getElementById('btnCerrar');

    btn.disabled = true;
    btnVolver.disabled = true;
    btnCerrar.disabled = true;
    btn.innerText = 'Procesando...';
    setStatus('⏳ Guardando paciente en el sistema...', '');

    google.script.run
      .withSuccessHandler(function(resultado) {
        btn.innerText = 'Guardar Paciente';
        btn.disabled = false;
        btnVolver.disabled = false;
        btnCerrar.disabled = false;
        setStatus(resultado.mensaje || 'Paciente creado correctamente.', 'success');
        limpiarFormularioNuevoPaciente();
      })
      .withFailureHandler(function(error) {
        btn.innerText = 'Guardar Paciente';
        btn.disabled = false;
        btnVolver.disabled = false;
        btnCerrar.disabled = false;
        setStatus(error.message || String(error), 'error');
      })
      .guardarNuevoPacienteDesdeFormulario({
        nombre: nombre,
        nhc: nhc,
        sexoGenero: sexoGenero,
        motivoConsultaDiagnostico: motivoConsultaDiagnostico,
        motivoConsultaOtros: motivoConsultaOtros,
        modalidad: modalidad,
        fechaPrimeraConsulta: fechaPrimeraConsulta
      });
  }

function volverAlPanel() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.host.close();
    })
    .withFailureHandler(function(error) {
      alert(error.message || String(error));
    })
    .abrirHomeDashboardDesdePantalla();
}

function actualizarMotivoOtros() {
  const motivo = document.getElementById('motivoConsultaDiagnostico').value;
  const input = document.getElementById('motivoConsultaOtros');

  input.disabled = motivo !== 'Otros';

  if (motivo !== 'Otros') {
    input.value = '';
  }
}

function limpiarFormularioNuevoPaciente() {
  document.getElementById('nombre').value = '';
  document.getElementById('nhc').value = '';
  document.getElementById('sexoGenero').selectedIndex = 0;
  document.getElementById('motivoConsultaDiagnostico').selectedIndex = 0;
  document.getElementById('motivoConsultaOtros').value = '';
  document.getElementById('motivoConsultaOtros').disabled = true;
  document.getElementById('modalidad').selectedIndex = 0;
  document.getElementById('fechaPrimeraConsulta').value = '';
}

  actualizarMotivoOtros();
  cargarModalidades();
    </script>
  </body>
</html>
