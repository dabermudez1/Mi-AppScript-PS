<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Gestión de Días Bloqueados</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      color: #1f1f1f;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 2px;
    }

    button.primary {
      background-color: #d9ead3 !important;
      border: 1px solid #9bbb8f !important;
      color: #1f1f1f !important;
    }

    button.secondary {
      background-color: #f3f3f3 !important;
      border: 1px solid #cccccc !important;
      color: #1f1f1f !important;
    }

    .danger {
      background: #f4cccc;
      border: 1px solid #ea9999;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-line;
    }

    .error { color: #b00020; }
    .success { color: #1b5e20; }

    .table-wrapper {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #cccccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: #eeeeee;
      text-align: left;
      padding: 8px;
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eeeeee;
    }

    tr:hover { background: #f9f9f9; }
  </style>
</head>
<body>
  <h2>Gestión de días bloqueados</h2>

  <div class="field">
    <label for="fechaDesde">Fecha Desde</label>
    <input type="date" id="fechaDesde">
  </div>

  <div class="field">
    <label for="fechaHasta">Fecha Hasta</label>
    <input type="date" id="fechaHasta">
  </div>

  <div class="field">
    <label for="motivo">Motivo del bloqueo</label>
    <input type="text" id="motivo" placeholder="Ej: Festivo, Vacaciones...">
  </div>

  <div class="actions">
    <button class="primary" onclick="guardarDiaBloqueado()">Bloquear rango</button>
    <button class="secondary" onclick="google.script.run.volverAlPanelDesdeDiasBloqueados()">Volver al panel</button>
    <button class="secondary" onclick="google.script.host.close()">Cerrar</button>
  </div>

  <div id="status" class="status"></div>

  <div style="margin-top: 24px;">
    <label>Días bloqueados registrados:</label>
    <div id="loadingMessage" class="status">Cargando datos...</div>
    
    <div id="tableWrapper" class="table-wrapper" style="display: none;">
      <table id="diasBloqueadosTable">
        <thead>
          <tr>
            <th style="width: 30px;"><input type="checkbox" id="selectAll"></th>
            <th style="width: 100px;">Fecha</th>
            <th>Motivo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    
    <div class="actions" id="deleteButtonGroup" style="display: none;">
      <button class="danger" onclick="eliminarDiasSeleccionados()">Eliminar seleccionados</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', cargarDiasBloqueados);

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg || '';
      el.className = 'status ' + (type || '');
    }

    function cargarDiasBloqueados() {
      const loading = document.getElementById('loadingMessage');
      const wrapper = document.getElementById('tableWrapper');
      loading.style.display = 'block';
      wrapper.style.display = 'none';
      document.getElementById('deleteButtonGroup').style.display = 'none';
      google.script.run
        .withSuccessHandler(displayDiasBloqueados)
        .withFailureHandler(e => setStatus('Error al cargar: ' + e.message, 'error'))
        .obtenerDiasBloqueadosFormulario();
    }

    function displayDiasBloqueados(dias) {
      const tbody = document.querySelector('#diasBloqueadosTable tbody');
      tbody.innerHTML = ''; // Limpiar tabla
      if (dias.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No hay días bloqueados.</td></tr>';
      } else {
        dias.forEach(dia => {
          const row = tbody.insertRow();
          row.insertCell().innerHTML = '<input type="checkbox" class="day-checkbox" value="' + dia.fecha + '">';
          row.insertCell().textContent = dia.fecha;
          row.insertCell().textContent = dia.motivo;
        });
      }
      document.getElementById('loadingMessage').style.display = 'none';
      document.getElementById('tableWrapper').style.display = 'block';
      document.getElementById('deleteButtonGroup').style.display = 'block';
    }

    function guardarDiaBloqueado() {
      setStatus('Guardando...', '');
      const formData = {
        fechaDesde: document.getElementById('fechaDesde').value,
        fechaHasta: document.getElementById('fechaHasta').value,
        motivo: document.getElementById('motivo').value
      };
      google.script.run
        .withSuccessHandler(function(resp) {
          setStatus(resp.mensaje, 'success');
          limpiarFormulario();
          cargarDiasBloqueados();
        })
        .withFailureHandler(e => setStatus('Error al guardar: ' + e.message, 'error'))
        .guardarDiaBloqueadoFormulario(formData);
    }

    document.getElementById('selectAll').addEventListener('change', function() {
      document.querySelectorAll('.day-checkbox').forEach(checkbox => {
        checkbox.checked = this.checked;
      });
    });

    function limpiarFormulario() {
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      document.getElementById('motivo').value = '';
    }

    function eliminarDiasSeleccionados() {
      setStatus('Eliminando...', '');
      const selectedDates = Array.from(document.querySelectorAll('.day-checkbox:checked'))
                               .map(checkbox => checkbox.value);
      if (selectedDates.length === 0) {
        setStatus('Selecciona al menos un día.', 'error');
        return;
      }
      if (!confirm('¿Seguro que deseas eliminar los ' + selectedDates.length + ' días seleccionados?')) {
        return;
      }
      google.script.run
        .withSuccessHandler(function(resp) {
          setStatus(resp.mensaje, 'success');
          cargarDiasBloqueados();
        })
        .withFailureHandler(e => setStatus('Error al eliminar: ' + e.message, 'error'))
        .eliminarLoteDiasBloqueadosFormulario(selectedDates);
    }
  </script>
</body>
</html>
