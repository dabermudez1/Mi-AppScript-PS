<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Gestión de Días Bloqueados</title>
  <style>
    :root { --primary: #4f46e5; --primary-hover: #4338ca; --danger: #dc2626; --danger-hover: #b91c1c; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
    h2 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
    input:focus { outline: 2px solid #818cf8; border-color: transparent; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
    .primary { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .primary:hover { background-color: var(--primary-hover); }
    .primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
    .secondary:hover { background-color: #f3f4f6; }
    .danger { background-color: var(--danger); color: white; }
    .danger:hover { background-color: var(--danger-hover); }
    .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; color: #6b7280; }
    .error { color: #dc2626; font-weight: bold; }
    .success { color: #16a34a; font-weight: bold; }

    .table-wrapper {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #cccccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: #eeeeee;
      text-align: left;
      padding: 8px;
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eeeeee;
    }

    tr:hover { background: #f9f9f9; }
  </style>
</head>
<body>
  <h2>Gestión de días bloqueados</h2>

  <div class="field">
    <label for="fechaDesde">Fecha Desde</label>
    <input type="date" id="fechaDesde">
  </div>

  <div class="field">
    <label for="fechaHasta">Fecha Hasta</label>
    <input type="date" id="fechaHasta">
  </div>

  <div class="field">
    <label for="motivo">Motivo del bloqueo</label>
    <input type="text" id="motivo" placeholder="Ej: Festivo, Vacaciones...">
  </div>

  <div class="actions">
    <button id="btnGuardar" class="primary" onclick="guardarDiaBloqueado()">Bloquear rango</button>
    <button id="btnVolver" class="secondary" onclick="google.script.run.volverAlPanelDesdeDiasBloqueados()">Volver al panel</button>
    <button id="btnCerrar" class="secondary" onclick="google.script.host.close()">Cerrar</button>
  </div>

  <div id="status" class="status"></div>

  <div style="margin-top: 24px;">
    <label>Días bloqueados registrados:</label>
    <div id="loadingMessage" class="status">Cargando datos...</div>
    
    <div id="tableWrapper" class="table-wrapper" style="display: none;">
      <table id="diasBloqueadosTable">
        <thead>
          <tr>
            <th style="width: 30px;"><input type="checkbox" id="selectAll"></th>
            <th style="width: 100px;">Fecha</th>
            <th>Motivo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    
    <div class="actions" id="deleteButtonGroup" style="display: none;">
      <button class="danger" onclick="eliminarDiasSeleccionados()">Eliminar seleccionados</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', cargarDiasBloqueados);

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg || '';
      el.className = 'status ' + (type || '');
    }

    function cargarDiasBloqueados() {
      const loading = document.getElementById('loadingMessage');
      const wrapper = document.getElementById('tableWrapper');
      loading.style.display = 'block';
      wrapper.style.display = 'none';
      document.getElementById('deleteButtonGroup').style.display = 'none';
      google.script.run
        .withSuccessHandler(displayDiasBloqueados)
        .withFailureHandler(e => setStatus('Error al cargar: ' + e.message, 'error'))
        .obtenerDiasBloqueadosFormulario();
    }

    function displayDiasBloqueados(dias) {
      const tbody = document.querySelector('#diasBloqueadosTable tbody');
      tbody.innerHTML = ''; // Limpiar tabla
      if (dias.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No hay días bloqueados.</td></tr>';
      } else {
        dias.forEach(dia => {
          const row = tbody.insertRow();
          row.insertCell().innerHTML = '<input type="checkbox" class="day-checkbox" value="' + dia.fecha + '">';
          row.insertCell().textContent = dia.fecha;
          row.insertCell().textContent = dia.motivo;
        });
      }
      document.getElementById('loadingMessage').style.display = 'none';
      document.getElementById('tableWrapper').style.display = 'block';
      document.getElementById('deleteButtonGroup').style.display = 'block';
    }

    function guardarDiaBloqueado() {
      const btn = document.getElementById('btnGuardar');
      const btnVolver = document.getElementById('btnVolver');
      const btnCerrar = document.getElementById('btnCerrar');
      
      btn.disabled = true;
      btnVolver.disabled = true;
      btnCerrar.disabled = true;
      btn.innerText = 'Procesando...';
      setStatus('⏳ Guardando bloqueos de agenda...', '');

      const formData = {
        fechaDesde: document.getElementById('fechaDesde').value,
        fechaHasta: document.getElementById('fechaHasta').value,
        motivo: document.getElementById('motivo').value
      };
      google.script.run
        .withSuccessHandler(function(resp) {
           btn.innerText = 'Bloquear rango';
          setStatus(resp.mensaje, 'success');
          limpiarFormulario();
          cargarDiasBloqueados();
          btn.disabled = false; btnVolver.disabled = false; btnCerrar.disabled = false;
        })
        .withFailureHandler(e => {
          btn.innerText = 'Bloquear rango';
          setStatus('Error al guardar: ' + e.message, 'error')
          btn.disabled = false; btnVolver.disabled = false; btnCerrar.disabled = false;
        })
        .guardarDiaBloqueadoFormulario(formData);
    }

    document.getElementById('selectAll').addEventListener('change', function() {
      document.querySelectorAll('.day-checkbox').forEach(checkbox => {
        checkbox.checked = this.checked;
      });
    });

    function limpiarFormulario() {
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      document.getElementById('motivo').value = '';
    }

    function eliminarDiasSeleccionados() {
      setStatus('Eliminando...', '');
      const selectedDates = Array.from(document.querySelectorAll('.day-checkbox:checked'))
                               .map(checkbox => checkbox.value);
      if (selectedDates.length === 0) {
        setStatus('Selecciona al menos un día.', 'error');
        return;
      }
      if (!confirm('¿Seguro que deseas eliminar los ' + selectedDates.length + ' días seleccionados?')) {
        return;
      }
      google.script.run
        .withSuccessHandler(function(resp) {
          setStatus(resp.mensaje, 'success');
          cargarDiasBloqueados();
        })
        .withFailureHandler(e => setStatus('Error al eliminar: ' + e.message, 'error'))
        .eliminarLoteDiasBloqueadosFormulario(selectedDates);
    }
  </script>
</body>
</html>
