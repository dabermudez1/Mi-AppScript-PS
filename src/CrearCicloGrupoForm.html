<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --primary: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
    h3 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
    select, input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; }
    input:focus, select:focus { outline: 2px solid #818cf8; border-color: transparent; }
    .info-box { background-color: #eef2ff; border-left: 4px solid var(--primary); padding: 12px; margin-bottom: 20px; font-size: 0.85em; border-radius: 0 8px 8px 0; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
    .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background-color: #f3f4f6; }
    .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; color: #6b7280; text-align: center; }
  </style>
</head>
<body>

<h3>Nuevo Ciclo de Grupo</h3>

<div class="info-box">
  <strong>Nota de Agenda:</strong> El sistema buscará automáticamente el primer hueco de <strong>90 minutos</strong> disponible en la agenda según la modalidad seleccionada y la fecha de inicio.
</div>

<form id="cicloForm">
  <div class="field">
    <label>Modalidad de Grupo</label>
    <select id="modalidad" name="modalidad" required>
      <option value="">-- Selecciona modalidad --</option>
    </select>
  </div>

  <div class="field">
    <label>Fecha de inicio (Búsqueda a partir de...)</label>
    <input type="date" id="fechaInicio" name="fechaInicio" required>
  </div>

  <div class="actions">
    <button type="button" class="btn-secondary" id="btnVolver" onclick="volverAlPanel()">Volver al panel</button>
    <button type="button" class="btn-secondary" id="btnCerrar" onclick="google.script.host.close()">Cerrar</button>
    <button type="submit" class="btn-primary" id="btnGuardar">Crear Ciclo</button>
  </div>

  <div id="status" class="status"></div>
</form>

<script>
  // Carga inicial de modalidades
  (function() {
    google.script.run
      .withSuccessHandler(function(opciones) {
        const select = document.getElementById('modalidad');
        opciones.forEach(opt => {
          const el = document.createElement('option');
          el.value = opt.value;
          el.textContent = opt.label;
          select.appendChild(el);
        });
      })
      .obtenerOpcionesGrupoFormulario();
      
    // Establecer fecha de hoy por defecto
    document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];
  })();

  document.getElementById('cicloForm').onsubmit = function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnGuardar');
    const btnCerrar = document.getElementById('btnCerrar');
    const btnVolver = document.getElementById('btnVolver');
    const status = document.getElementById('status');
    const formData = {
      modalidad: document.getElementById('modalidad').value,
      fechaInicio: document.getElementById('fechaInicio').value
    };

    if (!formData.modalidad || !formData.fechaInicio) {
      alert('Por favor, completa todos los campos.');
      return;
    }

    btn.disabled = true;
    btnCerrar.disabled = true;
    btnVolver.disabled = true;
    btn.textContent = 'Procesando...';
    status.textContent = '⏳ Calculando agenda y sesiones...';
    status.style.color = '#6b7280';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btnVolver.disabled = false;
        btnCerrar.disabled = false;
        btn.textContent = 'Crear Ciclo';
        status.textContent = '✅ ' + (res.mensaje || 'Ciclo creado correctamente.');
        status.style.color = '#16a34a';
        
        // Limpiar el formulario para permitir crear más grupos sin cerrar la ventana
        document.getElementById('cicloForm').reset();
        document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];
      })
      .withFailureHandler(function(err) {
        status.textContent = '❌ Fallo en la creación del ciclo.';
        status.style.color = '#dc2626';
        alert('Error: ' + err.message);
        btn.disabled = false;
        btnCerrar.disabled = false;
        btnVolver.disabled = false;
        btn.textContent = 'Crear Ciclo';
      })
      .guardarCicloGrupoDesdeFormulario(formData);
  };

  function volverAlPanel() {
    google.script.run
      .withSuccessHandler(function() {
        google.script.host.close();
      })
      .withFailureHandler(function(error) {
        alert(error.message || String(error));
      })
      .abrirHomeDashboardDesdePantalla();
  }
</script>

</body>
</html>
