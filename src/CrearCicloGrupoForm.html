<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; color: #333; background-color: #f9f9f9; }
    h3 { color: #2e7d32; margin-top: 0; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
    .field { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
    select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
    .info-box { background-color: #e3f2fd; border-left: 4px solid #2196f3; padding: 10px; margin-bottom: 20px; font-size: 0.85em; line-height: 1.4; }
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    .btn-primary { background-color: #2e7d32; color: white; }
    .btn-primary:hover { background-color: #1b5e20; }
    .btn-secondary { background-color: #e0e0e0; color: #333; }
    .btn-secondary:hover { background-color: #bdbdbd; }
    .loading { color: #666; font-style: italic; font-size: 0.8em; margin-top: 5px; display: none; }
  </style>
</head>
<body>

<h3>Nuevo Ciclo de Grupo</h3>

<div class="info-box">
  <strong>Nota de Agenda:</strong> El sistema buscará automáticamente el primer hueco de <strong>90 minutos</strong> disponible en la agenda según la modalidad seleccionada y la fecha de inicio.
</div>

<form id="cicloForm">
  <div class="field">
    <label>Modalidad de Grupo</label>
    <select id="modalidad" name="modalidad" required>
      <option value="">-- Selecciona modalidad --</option>
    </select>
  </div>

  <div class="field">
    <label>Fecha de inicio (Búsqueda a partir de...)</label>
    <input type="date" id="fechaInicio" name="fechaInicio" required>
  </div>

  <div id="loader" class="loading">Planificando sesiones en segundo plano...</div>

  <div class="actions">
    <button type="button" class="btn-secondary" onclick="google.script.host.close()">Cancelar</button>
    <button type="submit" class="btn-primary" id="btnGuardar">Crear Ciclo</button>
  </div>
</form>

<script>
  // Carga inicial de modalidades
  (function() {
    google.script.run
      .withSuccessHandler(function(opciones) {
        const select = document.getElementById('modalidad');
        opciones.forEach(opt => {
          const el = document.createElement('option');
          el.value = opt.value;
          el.textContent = opt.label;
          select.appendChild(el);
        });
      })
      .obtenerOpcionesGrupoFormulario();
      
    // Establecer fecha de hoy por defecto
    document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];
  })();

  document.getElementById('cicloForm').onsubmit = function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnGuardar');
    const loader = document.getElementById('loader');
    const formData = {
      modalidad: document.getElementById('modalidad').value,
      fechaInicio: document.getElementById('fechaInicio').value
    };

    if (!formData.modalidad || !formData.fechaInicio) {
      alert('Por favor, completa todos los campos.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Procesando...';
    loader.style.display = 'block';

    google.script.run
      .withSuccessHandler(function(res) {
        alert(res.mensaje);
        // Refrescar el panel principal si existe la función
        if (window.top && window.top.refrescarPanel) {
          window.top.refrescarPanel();
        }
        google.script.host.close();
      })
      .withFailureHandler(function(err) {
        alert('Error en la planificación: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Crear Ciclo';
        loader.style.display = 'none';
      })
      .guardarCicloGrupoDesdeFormulario(formData);
  };
</script>

</body>
</html>
