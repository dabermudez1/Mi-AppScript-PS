<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 16px;
        color: #1f1f1f;
      }

      h2 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 20px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .panel {
        border: 1px solid #d0d0d0;
        padding: 12px;
        background: #fafafa;
      }

      .field {
        margin-bottom: 14px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      select, input, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        font-size: 14px;
      }

      textarea {
        resize: none;
        height: 260px;
        background: #fff;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      button {
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      .primary {
        background: #d9ead3;
        border: 1px solid #9bbb8f;
      }

      .danger {
        background: #f4cccc;
        border: 1px solid #d99999;
      }

      .secondary {
        background: #f3f3f3;
        border: 1px solid #cccccc;
      }

      .status {
        margin-top: 14px;
        font-size: 13px;
        white-space: pre-line;
      }

      .error {
        color: #b00020;
      }

      .success {
        color: #1b5e20;
      }

      .hint {
        font-size: 12px;
        color: #555;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h2>Gestión de catálogos</h2>

    <div class="layout">
      <div class="panel">
        <div class="field">
          <label for="catalogo">Catálogo</label>
          <select id="catalogo" onchange="cargarValores()"></select>
          <div class="hint">Selecciona un catálogo existente para ver y gestionar sus valores.</div>
        </div>

        <div class="field">
          <label for="valoresCatalogo">Valores actuales</label>
          <textarea id="valoresCatalogo" readonly></textarea>
        </div>

        <div class="actions">
          <button class="secondary" onclick="refrescarCatalogos()">Refrescar</button>
        </div>
      </div>

      <div class="panel">
        <div class="field">
          <label for="nuevoCatalogo">Catálogo destino</label>
          <input id="nuevoCatalogo" type="text" placeholder="Ej: ESTADOS_PACIENTE" />
          <div class="hint">Puedes escribir uno existente o crear uno nuevo.</div>
        </div>

        <div class="field">
          <label for="nuevoValor">Valor</label>
          <input id="nuevoValor" type="text" placeholder="Ej: ACTIVO" />
        </div>

        <div class="actions">
          <button class="primary" onclick="agregarValor()">Añadir valor</button>
          <button class="danger" onclick="eliminarValor()">Eliminar valor seleccionado/escrito</button>
        </div>

        <div class="hint">
          Para eliminar, usa el catálogo actual y selecciona/escribe exactamente el valor.
        </div>
      </div>
    </div>
    <div class="actions" style="margin-top:16px;">
  <button class="secondary" onclick="volverAlPanel()">Volver al panel</button>
  <button class="secondary" onclick="google.script.host.close()">Cerrar</button>
</div>
    <div id="status" class="status"></div>

    <script>
      let catalogos = [];

      function setStatus(message, type) {
        const el = document.getElementById('status');
        el.textContent = message || '';
        el.className = 'status ' + (type || '');
      }

      function refrescarCatalogos() {
  refrescarCatalogosConSeleccion('');
}

function refrescarCatalogosConSeleccion(catalogoASeleccionar) {
  setStatus('Cargando catálogos...', '');

  google.script.run
    .withSuccessHandler(function(resultado) {
      catalogos = resultado || [];
      const select = document.getElementById('catalogo');
      select.innerHTML = '';

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '-- Selecciona un catálogo --';
      select.appendChild(placeholder);

      catalogos.forEach(function(item) {
        const option = document.createElement('option');
        option.value = item.catalogo;
        option.textContent = item.catalogo;
        select.appendChild(option);
      });

      if (catalogoASeleccionar) {
        select.value = catalogoASeleccionar;
        document.getElementById('nuevoCatalogo').value = catalogoASeleccionar;
        cargarValores();
      } else {
        document.getElementById('valoresCatalogo').value = '';
      }

      setStatus('', '');
    })
    .withFailureHandler(function(error) {
      setStatus(error.message || String(error), 'error');
    })
    .obtenerCatalogosAgrupadosFormulario();
}

      function cargarValores() {
        const nombre = document.getElementById('catalogo').value;
        const area = document.getElementById('valoresCatalogo');
        const inputCatalogo = document.getElementById('nuevoCatalogo');

        inputCatalogo.value = nombre || '';

        const item = catalogos.find(x => String(x.catalogo) === String(nombre));

        if (!item) {
          area.value = '';
          return;
        }

        area.value = (item.valores || []).join('\n');
      }

      function agregarValor() {
        const catalogo = document.getElementById('nuevoCatalogo').value.trim();
        const valor = document.getElementById('nuevoValor').value.trim();

        if (!catalogo) {
          setStatus('Debes indicar el catálogo.', 'error');
          return;
        }

        if (!valor) {
          setStatus('Debes indicar el valor.', 'error');
          return;
        }

        setStatus('Añadiendo valor...', '');

        google.script.run
          .withSuccessHandler(function(resultado) {
  const catalogoActual = document.getElementById('nuevoCatalogo').value.trim();
  setStatus(resultado.mensaje || 'Valor añadido.', 'success');
  document.getElementById('nuevoValor').value = '';
  refrescarCatalogosConSeleccion(catalogoActual);
})
          .withFailureHandler(function(error) {
            setStatus(error.message || String(error), 'error');
          })
          .agregarValorCatalogoFormulario({
            catalogo: catalogo,
            valor: valor
          });
      }

      function eliminarValor() {
        const catalogo = document.getElementById('nuevoCatalogo').value.trim();
        const valor = document.getElementById('nuevoValor').value.trim();

        if (!catalogo) {
          setStatus('Debes indicar el catálogo.', 'error');
          return;
        }

        if (!valor) {
          setStatus('Debes indicar exactamente el valor que quieres eliminar.', 'error');
          return;
        }

        const ok = confirm(
          'Vas a eliminar este valor del catálogo.\n\n' +
          'Catálogo: ' + catalogo + '\n' +
          'Valor: ' + valor + '\n\n' +
          '¿Deseas continuar?'
        );

        if (!ok) return;

        setStatus('Eliminando valor...', '');

        google.script.run
          .withSuccessHandler(function(resultado) {
  const catalogoActual = document.getElementById('nuevoCatalogo').value.trim();
  setStatus(resultado.mensaje || 'Valor eliminado.', 'success');
  document.getElementById('nuevoValor').value = '';
  refrescarCatalogosConSeleccion(catalogoActual);
})
          .withFailureHandler(function(error) {
            setStatus(error.message || String(error), 'error');
          })
          .eliminarValorCatalogoFormulario({
            catalogo: catalogo,
            valor: valor
          });
      }

function volverAlPanel() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.host.close();
    })
    .withFailureHandler(function(error) {
      alert(error.message || String(error));
    })
    .abrirHomeDashboardDesdePantalla();
}

      refrescarCatalogos();
    </script>
  </body>
</html>
