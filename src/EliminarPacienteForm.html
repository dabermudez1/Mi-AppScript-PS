<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root { --primary: #4f46e5; --danger: #dc2626; --danger-hover: #b91c1c; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
      h2 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
      .field { margin-bottom: 16px; }
      label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
      select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
      textarea { resize: none; height: 120px; background: #fdfdfd; }
      .warning { background-color: #fffbeb; border-left: 4px solid #f59e0b; padding: 12px; margin-bottom: 20px; font-size: 0.85em; border-radius: 0 8px 8px 0; color: #92400e; line-height: 1.5; }
      .actions { display: flex; gap: 10px; margin-top: 24px; }
      button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
      .danger { background-color: var(--danger); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .danger:hover { background-color: var(--danger-hover); }
      .danger:disabled { opacity: 0.5; cursor: not-allowed; }
      .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
      .secondary:hover { background-color: #f3f4f6; }
      .status { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; color: #6b7280; }
      .error { color: #dc2626; font-weight: bold; }
      .success { color: #16a34a; font-weight: bold; }
    </style>
  </head>
  <body>
    <h2>Eliminar paciente por error</h2>

    <div class="warning">
      Esta acción elimina físicamente el paciente y sus datos relacionados.<br>
    </div>

    <div class="field">
      <label for="paciente">Paciente eliminable</label>
      <select id="paciente" onchange="cargarImpacto()"></select>
    </div>

    <div class="field">
      <label for="impacto">Impacto del borrado</label>
      <textarea id="impacto" readonly></textarea>
    </div>

    <div class="actions">
  <button id="btnEliminar" class="danger" onclick="eliminarPaciente()" disabled>Eliminar Paciente</button>
  <button id="btnVolver" class="secondary" onclick="volverAlPanel()">Volver al panel</button>
  <button id="btnCerrar" class="secondary" onclick="google.script.host.close()">Cerrar</button>
</div>

    <div id="status" class="status"></div>

    <script>
      function setStatus(message, type) {
        const el = document.getElementById('status');
        el.textContent = message || '';
        el.className = 'status ' + (type || '');
      }

      function setEliminarEnabled(enabled) {
        document.getElementById('btnEliminar').disabled = !enabled;
      }

      function cargarPacientes() {
        google.script.run
          .withSuccessHandler(function(resultado) {
            const select = document.getElementById('paciente');
            select.innerHTML = '';

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '-- Selecciona un paciente --';
            select.appendChild(placeholder);

            (resultado || []).forEach(function(p) {
              const option = document.createElement('option');
              option.value = p.pacienteId;
              option.textContent = p.label;
              select.appendChild(option);
            });

            document.getElementById('impacto').value = '';
            setEliminarEnabled(false);
          })
          .withFailureHandler(function(error) {
            setStatus(error.message || String(error), 'error');
          })
          .obtenerPacientesEliminablesFormulario();
      }

      function cargarImpacto() {
        const pacienteId = document.getElementById('paciente').value;
        document.getElementById('impacto').value = '';
        setEliminarEnabled(false);

        if (!pacienteId) return;

        google.script.run
          .withSuccessHandler(function(info) {
            document.getElementById('impacto').value =
              'Paciente: ' + (info.nombre || '') + '\n' +
              'Modalidad: ' + (info.modalidad || '') + '\n' +
              'Estado: ' + (info.estado || '') + '\n' +
              'Primera consulta: ' + (info.fechaPrimeraConsulta || '') + '\n' +
              'Motivo espera: ' + (info.motivoEspera || '') + '\n' +
              'Ciclo relacionado: ' + (info.cicloId || '') + '\n' +
              'Asignaciones a borrar: ' + (info.asignaciones || 0) + '\n' +
              'Sesiones a borrar: ' + (info.sesiones || 0) + '\n' +
              'Libera plaza: ' + (info.liberaraPlaza ? 'Sí' : 'No');

            setEliminarEnabled(true);
          })
          .withFailureHandler(function(error) {
            setStatus(error.message || String(error), 'error');
          })
          .obtenerImpactoEliminacionPacienteFormulario(pacienteId);
      }

      function eliminarPaciente() {
        const pacienteId = document.getElementById('paciente').value;

        if (!pacienteId) {
          setStatus('Debes seleccionar un paciente.', 'error');
          return;
        }

        const confirmacion = confirm(
          'Esta acción elimina el paciente definitivamente junto con sus asignaciones y sesiones relacionadas.\n\n¿Deseas continuar?'
        );

        if (!confirmacion) return;

        const btn = document.getElementById('btnEliminar');
        const btnVolver = document.getElementById('btnVolver');
        const btnCerrar = document.getElementById('btnCerrar');

        btn.disabled = true;
        btnVolver.disabled = true;
        btnCerrar.disabled = true;
        btn.innerText = 'Procesando...';
        setStatus('⏳ Eliminando paciente del sistema...', '');

        google.script.run
          .withSuccessHandler(function(resultado) {
            btn.innerText = 'Eliminar Paciente';
            btn.disabled = false;
            btnVolver.disabled = false;
            btnCerrar.disabled = false;
            setStatus(resultado.mensaje || 'Paciente eliminado correctamente.', 'success');
            cargarPacientes();
            document.getElementById('impacto').value = '';
            setEliminarEnabled(false);
          })
          .withFailureHandler(function(error) {
            btn.innerText = 'Eliminar Paciente';
            btn.disabled = false;
            btnVolver.disabled = false;
            btnCerrar.disabled = false;
            setStatus(error.message || String(error), 'error');
          })
          .confirmarEliminacionPacienteFormulario({
            pacienteId: pacienteId
          });
      }
      
function volverAlPanel() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.host.close();
    })
    .withFailureHandler(function(error) {
      alert(error.message || String(error));
    })
    .abrirHomeDashboardDesdePantalla();
}

      cargarPacientes();
    </script>
  </body>
</html>
