<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --primary: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1f2937; background-color: #f9fafb; }
    h3 { color: #111827; margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.875rem; color: #374151; }
    select, input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 0.875rem; background: white; }
    input:focus, select:focus { outline: 2px solid #818cf8; border-color: transparent; }
    input[readonly] { background-color: #f3f4f6; color: #6b7280; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; }
    button:not(.secondary) { background-color: var(--primary); color: white; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    button:not(.secondary):hover { background-color: var(--primary-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .secondary { background-color: white; color: #374151; border: 1px solid #d1d5db; }
    .secondary:hover { background-color: #f3f4f6; }
    #statusGuardar { margin-top: 12px; font-size: 0.875rem; min-height: 1.25rem; font-style: italic; text-align: center; }
  </style>
</head>
<body>

<h3>Reprogramar sesión</h3>

<div class="field">
  <label>Modalidad</label>
  <select id="modalidad" onchange="cambiarModo()"></select>
</div>

<div id="bloqueIndividual">

  <div class="field">
    <label>Paciente</label>
    <select id="paciente" onchange="cargarSesionesPendientesIndividual()"></select>
  </div>

  <div class="field">
    <label>Sesión pendiente</label>
    <select id="numeroSesionInd" onchange="mostrarFechaActualIndividual()"></select>
  </div>

  <div class="field">
    <label>Fecha actual programada</label>
    <input type="text" id="fechaActualInd" readonly>
  </div>

</div>

<div id="bloqueGrupo" style="display:none;">

  <div class="field">
    <label>Ciclo</label>
    <select id="ciclo" onchange="cargarSesionesPendientesGrupo()"></select>
  </div>

  <div class="field">
    <label>Sesión pendiente del grupo</label>
    <select id="numeroSesionGrp" onchange="mostrarFechaActualGrupo()"></select>
  </div>

  <div class="field">
    <label>Fecha actual programada</label>
    <input type="text" id="fechaActualGrp" readonly>
  </div>

</div>

<div id="checkCascada" class="field" style="display:none; margin-top: 10px;">
  <label style="display:flex; align-items:center; gap:8px; font-weight:normal; background:#f0f4ff; padding:8px; border-radius:4px; border:1px solid #d1d9ff; cursor:pointer;">
    <input type="checkbox" id="cascada" style="width:auto; margin:0;"> 
    Reprogramar sesiones sucesivas en cascada
  </label>
</div>

<div class="field">
  <label>Nueva fecha</label>
  <input type="date" id="fecha" onchange="buscarSlotsDisponibles()">
</div>

<div class="field">
  <label for="hora">Nueva Hora (Slots disponibles)</label>
  <select id="hora" name="hora" required>
    <option value="">-- Selecciona una fecha primero --</option>
  </select>
  <small id="statusSlots" style="color: #666; font-style: italic;"></small>
</div>

<div class="actions">
  <button id="btnGuardar" onclick="guardar()">Guardar Reprogramación</button>
  <button id="btnVolver" class="secondary" onclick="volverAlPanel()">Volver al panel</button>
  <button id="btnCerrar" class="secondary" onclick="google.script.host.close()">Cerrar</button>
</div>
<div id="statusGuardar" style="margin-top: 8px; font-size: 13px; font-style: italic;"></div>

<script>
  let sesionesPendientesIndividual = [];
  let sesionesPendientesGrupo = [];
  const sesionPreseleccionadaId = '<?= typeof sesionPreseleccionadaId !== "undefined" ? sesionPreseleccionadaId : "" ?>';
  const origenPantalla = '<?= typeof origenPantalla !== "undefined" ? origenPantalla : "" ?>';
  let detalleSesionPreseleccionada = null;

  function cargarDatos() {
    google.script.run.withSuccessHandler(function(data) {
      const mod = document.getElementById('modalidad');
      mod.innerHTML = '';

      data.modalidades.forEach(m => {
        let o = document.createElement('option');
        o.value = m;
        o.textContent = m;
        mod.appendChild(o);
      });

      const pac = document.getElementById('paciente');
      pac.innerHTML = '';
      data.pacientes.forEach(p => {
        let o = document.createElement('option');
        o.value = p.id;
        o.textContent = p.nombre;
        pac.appendChild(o);
      });

      const cic = document.getElementById('ciclo');
      cic.innerHTML = '';
      data.ciclos.forEach(c => {
        let o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.label;
        cic.appendChild(o);
      });

      cambiarModo();

      if (pac.value) {
        cargarSesionesPendientesIndividual();
      }

      if (cic.value) {
        cargarSesionesPendientesGrupo();
      }

      if (sesionPreseleccionadaId) {
        aplicarSesionPreseleccionada();
      }

    }).obtenerDatosReprogramacion();
  }

  function cambiarModo() {
    const mod = document.getElementById('modalidad').value;

    if (mod === 'INDIVIDUAL') {
      document.getElementById('bloqueIndividual').style.display = 'block';
      document.getElementById('bloqueGrupo').style.display = 'none';
      document.getElementById('checkCascada').style.display = 'none';
      cargarSesionesPendientesIndividual();
    } else {
      document.getElementById('bloqueIndividual').style.display = 'none';
      document.getElementById('bloqueGrupo').style.display = 'block';
      document.getElementById('checkCascada').style.display = 'block';
      cargarSesionesPendientesGrupo();
    }
  }

  function cargarSesionesPendientesIndividual() {
    const pacienteId = document.getElementById('paciente').value;
    const select = document.getElementById('numeroSesionInd');
    const fechaActual = document.getElementById('fechaActualInd');

    select.innerHTML = '';
    fechaActual.value = '';
    sesionesPendientesIndividual = [];

    if (!pacienteId) return;

    google.script.run
      .withSuccessHandler(function(lista) {
        sesionesPendientesIndividual = lista || [];

        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '-- Selecciona una sesión pendiente --';
        select.appendChild(placeholder);

        sesionesPendientesIndividual.forEach(function(s) {
          const option = document.createElement('option');
          option.value = s.numeroSesion;
          option.textContent = s.label + (s.horaActual ? ' (' + s.horaActual + ')' : '');
          select.appendChild(option);
        });

        mostrarFechaActualIndividual();
      })
      .withFailureHandler(function(err) {
        alert(err.message || String(err));
      })
      .obtenerSesionesPendientesIndividualFormulario(pacienteId);
  }

  function cargarSesionesPendientesGrupo() {
    const cicloId = document.getElementById('ciclo').value;
    const select = document.getElementById('numeroSesionGrp');
    const fechaActual = document.getElementById('fechaActualGrp');

    select.innerHTML = '';
    fechaActual.value = '';
    sesionesPendientesGrupo = [];

    if (!cicloId) return;

    google.script.run
      .withSuccessHandler(function(lista) {
        sesionesPendientesGrupo = lista || [];

        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '-- Selecciona una sesión pendiente --';
        select.appendChild(placeholder);

        sesionesPendientesGrupo.forEach(function(s) {
          const option = document.createElement('option');
          option.value = s.numeroSesion;
          option.textContent = s.label + (s.horaActual ? ' (' + s.horaActual + ')' : '');
          select.appendChild(option);
        });

        mostrarFechaActualGrupo();
      })
      .withFailureHandler(function(err) {
        alert(err.message || String(err));
      })
      .obtenerSesionesPendientesGrupoFormulario(cicloId);
  }

  function mostrarFechaActualIndividual() {
    const numeroSesion = document.getElementById('numeroSesionInd').value;
    const fechaActual = document.getElementById('fechaActualInd');

    const sesion = sesionesPendientesIndividual.find(s => String(s.numeroSesion) === String(numeroSesion));
    fechaActual.value = sesion ? (sesion.fechaActual + (sesion.horaActual ? ' ' + sesion.horaActual : '')) : '';
  }

  function mostrarFechaActualGrupo() {
    const numeroSesion = document.getElementById('numeroSesionGrp').value;
    const fechaActual = document.getElementById('fechaActualGrp');

    const sesion = sesionesPendientesGrupo.find(s => String(s.numeroSesion) === String(numeroSesion));
    fechaActual.value = sesion ? (sesion.fechaActual + (sesion.horaActual ? ' ' + sesion.horaActual : '')) : '';
  }

  function buscarSlotsDisponibles() {
    const fecha = document.getElementById('fecha').value;
    const modalidad = document.getElementById('modalidad').value;
    const cicloId = document.getElementById('ciclo').value;
    const selectHora = document.getElementById('hora');
    const status = document.getElementById('statusSlots');

    if (!fecha || !modalidad) return;

    selectHora.innerHTML = '<option value="">Cargando slots...</option>';
    status.textContent = 'Consultando disponibilidad...';

    google.script.run
      .withSuccessHandler(function(slots) {
        selectHora.innerHTML = '';
        if (slots.length === 0) {
          selectHora.innerHTML = '<option value="">Sin huecos disponibles</option>';
          status.textContent = 'No hay slots libres para este día.';
        } else {
          status.textContent = slots.length + ' huecos encontrados.';
          slots.forEach(s => {
            let o = document.createElement('option');
            o.value = s.hora;
            o.textContent = s.label;
            selectHora.appendChild(o);
          });
        }
      })
      .withFailureHandler(err => {
        status.textContent = 'Error al buscar slots.';
        alert(err.message);
      })
      .obtenerSlotsDisponiblesParaReprogramacion(fecha, modalidad, cicloId);
  }

  function guardar() {
    const modalidad = document.getElementById('modalidad').value;

    const numeroSesion =
      modalidad === 'INDIVIDUAL'
        ? document.getElementById('numeroSesionInd').value
        : document.getElementById('numeroSesionGrp').value;

    const fecha = document.getElementById('fecha').value;
    const hora = document.getElementById('hora').value;

    if (!modalidad) {
      alert('Debes seleccionar una modalidad.');
      return;
    }

    if (!numeroSesion) {
      alert('Debes seleccionar una sesión pendiente.');
      return;
    }

    if (!hora) {
      alert('Debes seleccionar un slot de hora disponible.');
      return;
    }

    if (!fecha) {
      alert('Debes seleccionar la nueva fecha.');
      return;
    }

    const data = {
      modalidad: modalidad,
      pacienteId: document.getElementById('paciente').value,
      cicloId: document.getElementById('ciclo').value,
      numeroSesion: numeroSesion,
      fecha: fecha.split('-').reverse().join('/'),
      hora: hora,
      cascada: document.getElementById('cascada').checked
    };
    
    const btnGuardar = document.getElementById('btnGuardar');
    const statusGuardar = document.getElementById('statusGuardar');
    
    // Bloquear UI
    btnGuardar.disabled = true;
    btnGuardar.innerText = 'Procesando...';
    statusGuardar.innerText = '⏳ Guardando cambios en el sistema...';
    statusGuardar.style.color = '#666';

    google.script.run
    .withSuccessHandler(function(res) {
      statusGuardar.innerText = '✅ ¡Guardado con éxito!';
      statusGuardar.style.color = 'green';
      alert(res.mensaje);

      if (origenPantalla === 'SESIONES') {
        google.script.run
          .withSuccessHandler(function() {
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error.message || String(error));
          })
          .abrirPantallaSesionesDesdePantalla();
        return;
      }

      if (origenPantalla === 'INCIDENCIAS') {
        google.script.run
          .withSuccessHandler(function() {
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error.message || String(error));
          })
          .verIncidenciasCalendario();
        return;
      }

      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert(error.message || String(error));
        })
        .abrirHomeDashboardDesdePantalla();
    })
    .withFailureHandler(function(err) {
      // Restaurar UI en caso de error
      btnGuardar.disabled = false;
      btnGuardar.innerText = 'Guardar';
      statusGuardar.innerText = '❌ Error al guardar.';
      statusGuardar.style.color = 'red';
      alert(err.message || String(err));
    })
    .guardarReprogramacion(data);
  }

  function volverAlPanel() {
    if (origenPantalla === 'SESIONES') {
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert(error.message || String(error));
        })
        .abrirPantallaSesionesDesdePantalla();
      return;
    }

    if (origenPantalla === 'INCIDENCIAS') {
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert(error.message || String(error));
        })
        .verIncidenciasCalendario();
      return;
    }

    google.script.run
      .withSuccessHandler(function() {
        google.script.host.close();
      })
      .withFailureHandler(function(error) {
        alert(error.message || String(error));
      })
      .abrirHomeDashboardDesdePantalla();
  }

  function aplicarSesionPreseleccionada() {
    if (!sesionPreseleccionadaId) return;

    google.script.run
      .withSuccessHandler(function(detalle) {
        detalleSesionPreseleccionada = detalle;

        document.getElementById('modalidad').value = detalle.modalidad;
        document.getElementById('modalidad').disabled = true;

        cambiarModo();

        if (detalle.modalidad === 'INDIVIDUAL') {
          document.getElementById('paciente').value = detalle.pacienteId;
          document.getElementById('paciente').disabled = true;

          google.script.run
            .withSuccessHandler(function(lista) {
              sesionesPendientesIndividual = lista || [];
              renderSesionesIndividual(lista);

              document.getElementById('numeroSesionInd').value = String(detalle.numeroSesion);
              document.getElementById('numeroSesionInd').disabled = true;
              mostrarFechaActualIndividual();
            })
            .withFailureHandler(function(error) {
              alert(error.message || String(error));
            })
            .obtenerSesionesPendientesIndividualFormulario(detalle.pacienteId);
        } else {
          document.getElementById('ciclo').value = detalle.cicloId;
          document.getElementById('ciclo').disabled = true;

          google.script.run
            .withSuccessHandler(function(lista) {
              sesionesPendientesGrupo = lista || [];
              renderSesionesGrupo(lista);

              document.getElementById('numeroSesionGrp').value = String(detalle.numeroSesion);
              document.getElementById('numeroSesionGrp').disabled = true;
              mostrarFechaActualGrupo();
            })
            .withFailureHandler(function(error) {
              alert(error.message || String(error));
            })
            .obtenerSesionesPendientesGrupoFormulario(detalle.cicloId);
        }

        document.getElementById('fecha').value = convertirFechaEsAInput(detalle.fechaActual);
        
        if (detalle.horaActual) {
          document.getElementById('hora').value = detalle.horaActual;
        }
      })
      .withFailureHandler(function(error) {
        alert(error.message || String(error));
      })
      .obtenerSesionParaReprogramacionFormulario(sesionPreseleccionadaId);
  }

  function convertirFechaEsAInput(fechaTexto) {
    if (!fechaTexto) return '';
    const partes = String(fechaTexto).split('/');
    if (partes.length !== 3) return '';
    return partes[2] + '-' + partes[1].padStart(2, '0') + '-' + partes[0].padStart(2, '0');
  }

  function renderSesionesIndividual(lista) {
    const select = document.getElementById('numeroSesionInd');
    select.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '-- Selecciona sesión --';
    select.appendChild(placeholder);

    (lista || []).forEach(function(s) {
      const option = document.createElement('option');
      option.value = String(s.numeroSesion);
      option.textContent = s.label;
      select.appendChild(option);
    });
  }

  function renderSesionesGrupo(lista) {
    const select = document.getElementById('numeroSesionGrp');
    select.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '-- Selecciona sesión --';
    select.appendChild(placeholder);

    (lista || []).forEach(function(s) {
      const option = document.createElement('option');
      option.value = String(s.numeroSesion);
      option.textContent = s.label;
      select.appendChild(option);
    });
  }

  function resetFormularioReprogramacion() {
    document.getElementById('modalidad').disabled = false;
    document.getElementById('modalidad').selectedIndex = 0;

    document.getElementById('paciente').disabled = false;
    document.getElementById('ciclo').disabled = false;
    document.getElementById('numeroSesionInd').disabled = false;
    document.getElementById('numeroSesionGrp').disabled = false;

    document.getElementById('fecha').value = '';
    document.getElementById('fechaActualInd').value = '';
    document.getElementById('fechaActualGrp').value = '';

    sesionesPendientesIndividual = [];
    sesionesPendientesGrupo = [];

    document.getElementById('numeroSesionInd').innerHTML = '';
    document.getElementById('numeroSesionGrp').innerHTML = '';

    detalleSesionPreseleccionada = null;

    cambiarModo();
  }
  
  // Al cargar los datos de la sesión actual en el formulario, 
  // asegúrate de setear el valor por defecto de la hora.
  function cargarDatosSesion(sesion) {
    document.getElementById('fecha').value = sesion.fechaActualISO; // yyyy-MM-dd
    document.getElementById('hora').value = sesion.horaActual;     // HH:mm
  }
  cargarDatos();
</script>

</body>
</html>
